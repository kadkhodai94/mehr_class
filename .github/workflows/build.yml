name: Build Final Flutter APK From Latest ZIP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Clean Final App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Find latest ZIP or Flutter project
        shell: bash
        run: |
          set -e
          echo "Searching for latest ZIP..."
          ZIP_FILE=$(find "$GITHUB_WORKSPACE" -maxdepth 3 -type f -name "*.zip" -printf "%T@ %p\n" | sort -nr | head -n 1 | cut -d' ' -f2- || true)

          if [ -n "$ZIP_FILE" ]; then
            echo "Latest ZIP found: $ZIP_FILE"
            rm -rf "$GITHUB_WORKSPACE/extracted_app"
            mkdir -p "$GITHUB_WORKSPACE/extracted_app"
            unzip -q "$ZIP_FILE" -d "$GITHUB_WORKSPACE/extracted_app"
            SOURCE_PROJECT_DIR=$(find "$GITHUB_WORKSPACE/extracted_app" -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          else
            echo "No ZIP found. Searching repo for Flutter project..."
            SOURCE_PROJECT_DIR=$(find "$GITHUB_WORKSPACE" -path "$GITHUB_WORKSPACE/clean_flutter_app" -prune -o -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          fi

          if [ -z "$SOURCE_PROJECT_DIR" ]; then
            echo "No Flutter project found."
            exit 1
          fi

          echo "SOURCE_PROJECT_DIR=$SOURCE_PROJECT_DIR" >> $GITHUB_ENV
          echo "Source project: $SOURCE_PROJECT_DIR"

      - name: Create clean supported Flutter project
        shell: bash
        run: |
          set -e
          rm -rf "$GITHUB_WORKSPACE/clean_flutter_app"
          flutter create \
            -t app \
            --platforms=android \
            --org com.manyshah \
            --project-name mehrclass \
            "$GITHUB_WORKSPACE/clean_flutter_app"

      - name: Copy app source into clean Flutter project
        shell: bash
        run: |
          set -e
          rm -rf "$GITHUB_WORKSPACE/clean_flutter_app/lib"
          cp -R "$SOURCE_PROJECT_DIR/lib" "$GITHUB_WORKSPACE/clean_flutter_app/lib"

          if [ -d "$SOURCE_PROJECT_DIR/assets" ]; then
            rm -rf "$GITHUB_WORKSPACE/clean_flutter_app/assets"
            cp -R "$SOURCE_PROJECT_DIR/assets" "$GITHUB_WORKSPACE/clean_flutter_app/assets"
          fi

          cp "$SOURCE_PROJECT_DIR/pubspec.yaml" "$GITHUB_WORKSPACE/clean_flutter_app/pubspec.yaml"

          if [ -f "$SOURCE_PROJECT_DIR/analysis_options.yaml" ]; then
            cp "$SOURCE_PROJECT_DIR/analysis_options.yaml" "$GITHUB_WORKSPACE/clean_flutter_app/analysis_options.yaml"
          fi

      - name: Flutter clean
        run: flutter clean
        working-directory: ${{ github.workspace }}/clean_flutter_app

      - name: Flutter pub get
        run: flutter pub get
        working-directory: ${{ github.workspace }}/clean_flutter_app

      - name: Analyze project
        run: flutter analyze || true
        working-directory: ${{ github.workspace }}/clean_flutter_app

      - name: Build release APK
        run: flutter build apk --release --build-name=1.3.0 --build-number=4
        working-directory: ${{ github.workspace }}/clean_flutter_app

      - name: Build release AAB
        run: flutter build appbundle --release --build-name=1.3.0 --build-number=4
        working-directory: ${{ github.workspace }}/clean_flutter_app

      - name: Upload final APK
        uses: actions/upload-artifact@v4
        with:
          name: mehr-class-v1-3-0-ui-clean-apk
          path: ${{ github.workspace }}/clean_flutter_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload final AAB
        uses: actions/upload-artifact@v4
        with:
          name: mehr-class-v1-3-0-ui-clean-aab
          path: ${{ github.workspace }}/clean_flutter_app/build/app/outputs/bundle/release/app-release.aab
